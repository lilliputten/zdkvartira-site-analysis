Главная страница:
  id: 00-main
  description: Главная страница
  example_url: https://zdkvartira.ru/
  example_title: Агентство недвижимости в Железнодорожном, Балашихе | Купить квартиру от «МИЭЛЬ»
  total_pages: 1
  blocks:
  - id: mainheader
    selector: .mainheader
    description: 'Главное меню и шапка сайта; Содержит: время работы, кнопки ''Избранное'' и ''Сравнение'', логотип, название
      ''Офис в Железнодорожном'', телефон, главное меню, кнопка подачи заявки, поиск; CSS селектор: `.mainheader`; Общий блок
      для всех страниц, не учитывается при определении типа страницы'
    common_block: true
  - id: content-list
    selector: .container
    description: 'Список материалов (новости, статьи, аналитика). Контейнер с карточками контента; CSS селектор: `.container`'
  - id: top-back
    selector: .top-back
    heading: Недвижимость в Железнодорожном, Балашихе
    description: 'Hero блок с заголовком раздела (заголовок: "Недвижимость в Железнодорожном, Балашихе"); Включает форму поиска
      недвижимости; Поля поиска: ''Цена от'', ''Цена до'', ''search''; CSS селектор: `.top-back`'
  - id: actions
    selector: '#actions.gray-block.serial-section'
    heading: Самое интересное
    description: 'Заголовок: "Самое интересное"; Анонсы акций ("Самое интересное"). Карточки с баннерами для акций: графическая
      подложка, аудитория, текст предложения, датой проведения; CSS селектор: `#actions`'
  - id: special
    selector: '#special.white-block.serial-section'
    heading: Суперпредложения
    description: 'Заголовок: "Суперпредложения"; Секция с объектами недвижимости ("Суперпредложения"). Карточки объектов с
      превью, кнопками "к сравнению" и "в избранное", адресом, типом объекта и параметрами (площадь, этаж, направление); CSS
      селектор: `#special`'
  - id: services
    selector: '#services.gray-block.serial-section'
    heading: Услуги
    description: 'Заголовок: "Услуги"; Быстрые ссылки на разделы услуг ("Услуги"). Иконки с названием услуги со ссылками на
      страницы услуг; CSS селектор: `#services`'
  - id: news
    selector: '#news.serial-section'
    heading: Новости
    description: 'Заголовок: "Новости"; Новости сайта. Карточки новостей с превью, тегом, датой и кратким анонсом; CSS селектор:
      `#news`'
  - id: add
    selector: '#add.gray-block.rad-block'
    description: 'Переходы к служебным разделам: "Проверено МИЭЛЬ", "Аналитика цен", "Работа в офисе"; CSS селектор: `#add`'
  - id: word
    selector: '#word.serial-section'
    heading: Обращение руководителя
    description: 'Заголовок: "Обращение руководителя"; Обращение руководителя. Фото генерального директора, текст обращения;
      CSS селектор: `#word`'
  - id: last-video-reviews
    selector: '#last-video-reviews.d-none.gray-block.serial-section'
    heading: Видеоотзывы
    description: 'Заголовок: "Видеоотзывы"; Видеоотзывы. Видео с Rutube с описанием (имя клиента) и датой. Ссылка перехода
      в раздел видеоотзывов; CSS селектор: `#last-video-reviews`'
  - id: form
    selector: '#form.blue-block.text-center'
    heading: Не нашли ответ на свой вопрос?
    description: 'Заголовок: "Не нашли ответ на свой вопрос?"; Форма обратной связи ("Не нашли ответ на свой вопрос?"). Поля:
      имя, телефон, email, кнопка отправки; CSS селектор: `#form`'
  - id: footer
    selector: .footer
    description: 'Подвал сайта; Содержит: контакты, общая информация, меню навигации; CSS селектор: `.footer`; Общий блок
      для всех страниц, не учитывается при определении типа страницы'
    common_block: true
  pages_count: 1
